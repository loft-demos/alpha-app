apiVersion: management.loft.sh/v1
kind: VirtualClusterInstance
metadata:
  name: test-auto-nodes-1
  namespace: p-default
spec:
  displayName: test-auto-nodes-1
  owner:
    team: loft-admins
  template:
    metadata: {}
    instanceTemplate:
      metadata: {}
    pro:
      enabled: true
    helmRelease:
      chart:
        version: 0.28.0-rc.1
      values: |
        controlPlane:
          backingStore:
            etcd:
              embedded:
                enabled: true
          distro:
            k8s:
              image:
                tag: v1.33.4
          service:
            spec:
              type: LoadBalancer
        privateNodes:
          enabled: true
          autoNodes:
            dynamic:
              - name: gcp-node-pool
                provider: gcp-compute-node-provider
                limits:
                  cpu: '30'
                requirements:
                  - property: vcluster.com/node-type
                    operator: In
                    values:
                      - gcp-compute-node-provider.e2-small
    accessPoint:
      ingress: {}
    spaceTemplate:
      metadata: {}
  clusterRef:
    cluster: loft-cluster
  networkPeer: true
